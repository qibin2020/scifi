# Model ranking: rank → model name + budget
# Based on 290-run benchmark (always_young/RD 2026-04): success rate, token efficiency, latency
# rank 0-4 = tool-capable tiers, rank -2 = reasoning-only
# budget: max API calls per run (-1 = unlimited)
# thinkable: if true, driver can enable chain-of-thought reasoning

models:
  # rank 3: top-tier premium
  - rank: 3
    name: claude-opus
    budget: 0
    thinkable: true
    max_thinking_budget: 128000
    max_tokens: 32000

  # rank 2: work + control capable
  - rank: 2
    name: gemma4
    budget: -1
    thinkable: false   # 31b dense, Ollama Cloud, 42/42 sci bench validated
  - rank: 2
    name: claude-haiku
    budget: 0
    thinkable: true    # 250 avg tokens, fast 88s, thinkable w/ 16K budget
    max_thinking_budget: 16384
    max_tokens: 8192

  # rank 1: lean worker, 100% bench success
  - rank: 1
    name: llama4-scout
    budget: -1
    thinkable: false   # 75 avg tokens, 100% success, 105s, 89% tool-use

  # rank 0: backup — reliable but slow
  - rank: 0
    name: deepseek-v3
    budget: -1
    thinkable: false   # 198 avg tokens, 100% success, 183s

  # rank -1: can't use tools, fallback only
  - rank: -1
    name: gpt-oss
    budget: -1
    thinkable: false

  # rank -2: reasoning-only, no tools, good for review/reflect
  - rank: -2
    name: deepseek-r1
    budget: 500
    thinkable: false

connection_max: 10
