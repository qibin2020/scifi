# Model ranking: rank → model name + budget
# Based on 290-run benchmark (always_young/RD 2026-04): success rate, token efficiency, latency
# rank 0-4 = tool-capable tiers, rank -2 = reasoning-only
# budget: max API calls per run (-1 = unlimited)
# thinkable: if true, driver can enable chain-of-thought reasoning

models:
