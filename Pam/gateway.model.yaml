general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  background_health_checks: true
  health_check_interval: 300

router_settings:
  enable_pre_call_checks: true
  retry_policy:
    RateLimitError: 2
    AuthenticationError: 0

litellm_settings:
  modify_params: true
  num_retries: 1
  cooldown_time: 300
  allowed_fails: 1
