  # ── gemma4 (Ollama Cloud) — current primary work + control model ──
  # keep_alive=30m: prevents the 60–280 s cold-reload Ollama Cloud incurs when
  # the model is GPU-evicted between idle gaps. See
  # /home/u0/Work/sci-fi-RD/gateway_overhead_study.md §7a.
  #
  # For 2-key load balancing (raises the concurrency ceiling, see study §4),
  # add a second deployment under the same model_name using OLLAMA_API_KEY1
  # (or any indexed variant — Pam/gateway.sh forwards them automatically).
  # Not committed: keys are user-specific and the second deployment only
  # makes sense when both keys are populated in .secret.sh.
  - model_name: gemma4
    litellm_params:
      model: openai/gemma4:31b-cloud
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
      keep_alive: "30m"
      max_parallel_requests: 6        # Pam-side semaphore: queues req #7 transparently,
                                      # so Ollama's "too many concurrent" 429 never fires.
                                      # See gateway_overhead_study.md §router.py:2164 (asyncio.Semaphore).

