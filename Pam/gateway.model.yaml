general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  background_health_checks: true
  health_check_interval: 300

router_settings:
  # Tuned per /home/u0/Work/sci-fi-RD/gateway_overhead_study.md §8.
  # Ollama Cloud rate-limits by *concurrency*, not RPM — its 429 returns when
  # the deployment is healthy and the slot frees in milliseconds, not 30 s.
  # The LiteLLM defaults (allowed_fails: 2 / cooldown_time: 30) misinterpret
  # those 429s as deployment failure and bench a healthy peer for 30 s of
  # wall-clock time, then num_retries cannot rescue and the client sees 5xx.
  # Goal: minimize LLM time in total wall — short cooldown, retry rolls forward.
  routing_strategy: least-busy   # route to fewest-in-flight deployment (no Redis); harmless with 1 deployment, helpful with N
  num_retries: 60                # high — absorbs upstream bursts transparently, gives caller smooth latency instead of 429
  retry_after: 1                 # Ollama concurrency-429 slot clears in ms
  allowed_fails: 5               # only cooldown after 5 *consecutive* fails — real outage signal, not a transient burst
  cooldown_time: 5               # short circuit-breaker, not a wall-clock penalty
  enable_pre_call_checks: true
  retry_policy:
    RateLimitError: 5
    AuthenticationError: 0

litellm_settings:
  modify_params: true
  request_timeout: 300           # backstop on pathological queue depth — caller never blocks > 5 min per call
